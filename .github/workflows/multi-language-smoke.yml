name: Multi-Language Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Run config_loader tests
      run: python -m pytest tools/tests/test_config_loader.py -v

    - name: Run vocab_note tests
      run: python -m pytest tools/tests/test_vocab_note.py -v

    - name: Run vocab_ops tests
      run: python -m pytest tools/tests/test_vocab_ops.py -v

    - name: Run update_next_day_review tests
      run: python -m pytest agent-skills/next-day-review-updater/tests/test_update_next_day_review.py -v

    - name: Run vault-structure tests
      run: python -m pytest tools/vault-structure/tests/ -v

    - name: Run listening-transcribe tests
      run: python -m pytest tools/listening-transcribe-official/tests/ -v
      continue-on-error: true  # Known pre-existing failure

    - name: Verify config.json schema
      run: |
        python -c "
        import json
        from pathlib import Path

        config_path = Path('系统配置/config.json')
        if config_path.exists():
            config = json.loads(config_path.read_text())
            assert 'language_profile' in config, 'Missing language_profile'
            assert 'name' in config['language_profile'], 'Missing name'
            assert 'tag_namespace' in config['language_profile'], 'Missing tag_namespace'
            assert 'speaking_text_field' in config['language_profile'], 'Missing speaking_text_field'
            print('config.json schema validation: PASSED')
        else:
            print('config.json not found, skipping schema validation')
        "

    - name: Verify template structure
      run: |
        if [ -d "系统配置/模板/jp" ]; then
          echo "Japanese templates directory: EXISTS"
          ls -la "系统配置/模板/jp/"
        fi
        if [ -d "系统配置/模板/en" ]; then
          echo "English templates directory: EXISTS"
          ls -la "系统配置/模板/en/"
        fi

    - name: Verify agent-skills structure
      run: |
        for skill in listening-script-generator next-day-review-updater review-material-maintainer source-note-generator survival-speaking-card-generator; do
          if [ -d "agent-skills/$skill" ]; then
            echo "✓ agent-skills/$skill EXISTS"
          else
            echo "✗ agent-skills/$skill MISSING"
            exit 1
          fi
        done
