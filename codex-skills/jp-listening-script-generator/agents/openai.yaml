interface:
  display_name: "JP Listening Script Generator"
  short_description: "Create fixed 泛听 or 精听 listening-practice notes from one local audio file or media URL."
  default_prompt: >-
    Use $jp-listening-script-generator to turn one local listening audio file or media URL into the vault's current listening-practice Markdown note format through the sibling ListenKit CLI. Default to `--listening-mode extensive` 泛听 unless the user explicitly requests 精听 or the existing note already has `listening_mode: intensive` / `## 精听学习包`; use `--listening-mode intensive` for逐句精听. For URL input, require a target --output-dir under 学习系统/听力 so the finalized audio and note are created together. Before generation, ensure the offline dictionary cache is ready with `python3 tools/listening-transcribe-official/setup_offline_dictionary.py --check`; if it is missing, install with `--install` so the cache lives outside the vault under `~/Library/Caches/jp-listening-dicts` or `JP_LISTENING_DICT_DIR`. Prefer a topic-bearing note title, create the note if it does not exist yet, and render frontmatter, audio embed, `## 脚本`, `## 可直接背的常用句`, and `## 素材说明`. In 泛听, do not render `## 精听学习包` or sentence slices; inline known accent marks such as `相撲取り⓪` directly inside `## 脚本`. In 精听, render `## 精听学习包` before the plain `## 脚本`; each learning block is `### SNN`, the accent-marked sentence, and the real sentence audio embed `![[audio_stem_SNN.m4a]]`. Do not inline or list 待确认 items, and do not show 已确认/本地候选/待确认 source labels inside the note body. When no reliable intensive clip exists, write only `（语音切片待生成）`. Do not write 本地候选 values back as confirmed vocab accents. Treat common-sentence selection as a second phase: read the full script, choose 0-5 truly reusable sentences for `可直接背的常用句`, and render each item as `原句` / `可替换骨架` / `使用场景` / `选入理由` without a Chinese translation field. Sync `daily_use_sentences` with only the Japanese original/core sentences, reject overly generic filler such as `〜は〜です`, reject unstable ASR or unnatural phrasing, and preserve existing second-phase manual edits unless the user explicitly asks to reset them. Dialogue formatting is content-based and conservative with `A：/B：`; for short-choice materials rely on the generator's short-choice mode and preserve stronger existing scripts when appropriate.

policy:
  allow_implicit_invocation: true
